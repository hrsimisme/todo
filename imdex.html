<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Todo & Timer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="timer-section">
                <div class="timer-display">
                    <svg class="timer-svg" viewBox="0 0 100 100">
                        <circle class="timer-bg" cx="50" cy="50" r="45"></circle>
                        <circle class="timer-progress" cx="50" cy="50" r="45"></circle>
                    </svg>
                    <div class="time-text"></div>
                </div>
                <div class="timer-controls">
                    <button id="start-stop" class="btn-primary">START</button>
                    <button id="reset" class="btn-secondary">RESET</button>
                </div>
            </div>

            <div class="everyday-section" draggable="false">
                <div id="everyday-listbox" class="list-box">
                    <div class="list-box-header">
                        <span class="everyday-title">Every Day</span>
                        <span class="count">0/0</span>
                        <button class="done-btn">done</button>
                    </div>
                    <div class="todo-list"></div>
                    <div class="add-item-row" style="cursor:pointer;">+ 리스트 추가하기</div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="header-top">
                    <h1 id="current-date"></h1>
                    <button id="mobile-timer-btn" class="timer-icon-btn"></button>
                    <button id="main-edit-all" class="edit-btn">edit</button>
                </div>
                <p class="quote">"질문은 용기이자 세상을 변화시키는 힘이다."</p>
            </header>

            <section id="list-container">
                </section>

            <button id="add-list-box-btn" class="add-main-btn">+</button>
        </main>
    </div>

    <div id="timer-overlay" class="overlay">
        <button class="close-overlay">&lsaquo;</button>
        <div class="overlay-content">
            <h2>TIMER</h2>
            <div class="timer-display large">
                <svg class="timer-svg" viewBox="0 0 100 100">
                    <circle class="timer-progress" cx="50" cy="50" r="45"></circle>
                    <circle id="progress-ring" class="timer-progress" cx="50" cy="50" r="45"></circle>
                </svg>
                <div class="time-text">10:00</div>
            </div>
            <div class="timer-controls">
                <button class="btn-primary">STOP</button>
                <button class="btn-secondary">RESET</button>
            </div>
        </div>
    </div>

<template id="list-template">
    <div class="list-box">
        <div class="list-box-header">
            <button class="delete-list-btn" style="display:none;">×</button>
            <input type="text" placeholder="카테고리명" class="list-input">
            <span class="count">0/0</span>
            <button class="done-btn">done</button>
        </div>
        <div class="todo-list"></div>
        <div class="add-item-row" style="cursor:pointer;">+ 리스트 추가하기</div>
    </div>
</template>

<template id="item-template">
    <div class="todo-item">
        <input type="checkbox" class="todo-check">
        <input type="text" placeholder="할 일을 입력하세요" class="item-input">
        <button class="delete-item-btn" style="display:none;">×</button>
    </div>
</template>

    <script src="script.js"></script>
</body>
</html>
